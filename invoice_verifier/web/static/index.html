<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invoice Verifier — SSC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <!-- ── Header ── -->
  <header class="app-header">
    <div class="header-brand">
      <div class="header-logo">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
      </div>
      <span class="header-title">Invoice Verifier</span>
      <span class="header-sep">·</span>
      <span class="header-org">SSC</span>
    </div>
    <div class="header-right">
      <span class="status-dot"></span>
      <span class="status-label">Online</span>
    </div>
  </header>

  <!-- ── Main ── -->
  <main class="app-main">

    <!-- LEFT: Upload + Progress -->
    <aside class="sidebar">

      <div class="card upload-card">
        <div class="card-header">
          <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
          </svg>
          <span>Upload Dokumen</span>
        </div>

        <div id="drop-zone" class="drop-zone">
          <svg class="drop-icon" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
          </svg>
          <p class="drop-primary">Drop PDF here</p>
          <p class="drop-secondary">or choose file — max 20 MB</p>
          <input id="file-input" type="file" accept=".pdf" hidden />
        </div>

        <div id="file-info" class="file-info hidden">
          <div class="file-info-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
              <path d="M14 2v6h6M9 13h6M9 17h4"/>
            </svg>
          </div>
          <span id="file-name" class="file-name"></span>
          <button id="btn-clear" class="btn-icon-sm" title="Hapus">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M18 6L6 18M6 6l12 12"/>
            </svg>
          </button>
        </div>

        <button id="btn-submit" class="btn btn-primary" disabled>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          <span>Mulai Verifikasi</span>
        </button>
      </div>

      <!-- Progress card -->
      <div id="progress-card" class="card progress-card hidden">
        <div class="progress-header">
          <div class="progress-spinner"></div>
          <span id="progress-status" class="progress-label-text">Memproses...</span>
          <span id="job-id-label" class="job-id-label"></span>
        </div>
        <div class="progress-track">
          <div id="progress-fill" class="progress-fill" style="width:0%"></div>
        </div>
        <div class="progress-footer">
          <span id="progress-pct" class="progress-pct">0%</span>
        </div>
      </div>

    </aside>

    <!-- RIGHT -->
    <section class="content">

      <!-- Activity Log -->
      <div class="card log-card">
        <div class="card-header">
          <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M13 10V3L4 14h7v7l9-11h-7z"/>
          </svg>
          <span>Aktivitas Agent</span>
          <span id="log-badge" class="log-badge hidden"></span>
        </div>
        <div id="activity-log" class="activity-log">
          <div class="log-empty">
            <div class="log-empty-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="26" height="26">
                <circle cx="12" cy="12" r="10"/>
                <path d="M12 8v4M12 16h.01" stroke-linecap="round"/>
              </svg>
            </div>
            <p>Upload dokumen untuk memulai verifikasi</p>
          </div>
        </div>
      </div>

      <!-- Result Panel -->
      <div id="result-panel" class="card result-card hidden">
        <div class="card-header">
          <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
          </svg>
          <span>Hasil Verifikasi</span>
        </div>

        <div id="result-summary"></div>

        <div class="tabs" role="tablist">
          <button class="tab-btn active" data-tab="detail" role="tab">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2"/>
            </svg>
            Detail Dokumen
          </button>
          <button class="tab-btn" data-tab="authenticity" role="tab">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
            Autentisitas
          </button>
        </div>

        <div id="tab-detail"       class="tab-content active"></div>
        <div id="tab-authenticity" class="tab-content"></div>
      </div>

    </section>
  </main>

  <script src="/js/app.js"></script>
</body>
</html>
